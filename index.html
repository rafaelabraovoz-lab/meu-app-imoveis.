<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body class="bg-black text-white">

<div class="flex flex-col lg:flex-row min-h-screen">

  <!-- PAINEL -->
  <div class="p-6 lg:w-1/3 bg-zinc-900">
    <h1 class="text-3xl font-black mb-4 text-yellow-500">IMOB BANNER PRO</h1>

    <div class="space-y-4">
      <input id="nome" placeholder="Nome do imóvel" class="w-full p-3 rounded bg-zinc-800">
      <input id="cidade" placeholder="Cidade" class="w-full p-3 rounded bg-zinc-800">
      <input id="preco" placeholder="Preço (ex: R$ 1.200.000)" class="w-full p-3 rounded bg-zinc-800">
      <input id="destaques" placeholder="Destaques (piscina, varanda...)" class="w-full p-3 rounded bg-zinc-800">

      <button onclick="gerar()" class="w-full bg-yellow-500 text-black font-bold p-3 rounded">
        GERAR BANNER
      </button>

      <button onclick="baixar()" class="w-full bg-white text-black font-bold p-3 rounded">
        BAIXAR IMAGEM
      </button>
    </div>
  </div>

  <!-- BANNER -->
  <div class="flex-1 flex items-center justify-center bg-black">
    <div id="banner" class="w-[360px] h-[640px] bg-zinc-800 relative rounded-3xl overflow-hidden">

      <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>

      <div class="absolute bottom-0 p-6">
        <h2 id="titulo" class="text-3xl font-black leading-tight">
          Seu novo imóvel
        </h2>

        <p id="sub" class="text-sm text-zinc-300 mt-2">
          Preencha os dados para gerar
        </p>

        <p id="precoFinal" class="text-yellow-500 font-bold mt-3 text-lg"></p>
      </div>
    </div>
  </div>

</div>

<script>
function gerar(){
  const nome = document.getElementById('nome').value;
  const cidade = document.getElementById('cidade').value;
  const preco = document.getElementById('preco').value;
  const destaques = document.getElementById('destaques').value.toLowerCase();

  let titulo = "Oportunidade Exclusiva";
  let sub = "Um imóvel pensado para quem exige alto padrão.";

  if(destaques.includes("piscina")){
    titulo = "Lazer Privativo de Alto Nível";
    sub = "Piscina e conforto para viver como resort.";
  }

  if(destaques.includes("luxo")){
    titulo = "Arquitetura de Luxo";
    sub = "Design sofisticado para um estilo de vida único.";
  }

  document.getElementById('titulo').innerText = nome || titulo;
  document.getElementById('sub').innerText = cidade + " • " + sub;
  document.getElementById('precoFinal').innerText = preco;
}

function baixar(){
  html2canvas(document.querySelector("#banner")).then(canvas => {
    let link = document.createElement('a');
    link.download = 'banner-imobiliario.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  });
}
</script>

</body>
</html>
