<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<body class="bg-gray-900 text-white p-5">
  <div class="max-w-md mx-auto">
    <input type="file" id="upload" accept="application/pdf" class="mb-5 block w-full text-sm">
    
    <div id="banner" class="w-full aspect-[9/16] bg-gradient-to-b from-blue-700 to-black p-10 flex flex-col justify-between border-4 border-white">
      <h2 id="b-nome" class="text-4xl font-black uppercase tracking-tighter">Aguardando PDF...</h2>
      <div>
        <p id="b-info" class="text-xl font-light"></p>
        <div class="h-2 w-20 bg-yellow-400 my-6"></div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('upload');
    input.onchange = async (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = async function() {
        const loadingTask = pdfjsLib.getDocument(new Uint8Array(this.result));
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const content = await page.getTextContent();
        const texto = content.items.map(item => item.str).join(" ");
        
        // Lógica simples de extração: pega as primeiras palavras como nome
        document.getElementById('b-nome').innerText = texto.substring(0, 30) + "...";
        document.getElementById('b-info').innerText = "Extraído do Book PDF";
      };
      reader.readAsArrayBuffer(file);
    };
  </script>
</body>
