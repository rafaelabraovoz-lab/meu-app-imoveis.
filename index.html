<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
body { font-family: 'Montserrat', sans-serif; }

/* efeito premium de texto */
.text-pro {
  text-shadow:
    0 2px 10px rgba(0,0,0,0.7),
    0 0 20px rgba(0,0,0,0.5);
}

/* máscara lateral tipo seu exemplo */
.mask-lines {
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:120px;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.25),
    rgba(255,255,255,0.25) 6px,
    transparent 6px,
    transparent 18px
  );
  mix-blend-mode: overlay;
}
</style>

</head>

<body class="bg-black text-white">

<div class="flex">

<!-- CONTROLE -->
<div class="w-1/4 p-6 bg-zinc-900">
  <h1 class="text-2xl font-black text-yellow-400 mb-4">IMOB AI PRO</h1>

  <input type="file" id="upload" accept="application/pdf"
  class="w-full p-4 bg-zinc-800 rounded mb-4">

  <button onclick="baixarTudo()" class="w-full bg-white text-black p-3 rounded font-bold">
    BAIXAR TODOS
  </button>

  <p id="status" class="text-xs mt-4 text-zinc-400"></p>
</div>

<!-- BANNERS -->
<div id="banners" class="flex flex-wrap gap-6 p-6"></div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

document.getElementById('upload').onchange = async (e) => {

  const container = document.getElementById('banners');
  container.innerHTML = "";

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function() {

    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

    // PEGAR PRIMEIRA PAGINA EM ALTA QUALIDADE
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 3 });

    const canvas = document.createElement("canvas");
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({
      canvasContext: canvas.getContext('2d'),
      viewport: viewport
    }).promise;

    const imgURL = canvas.toDataURL();

    // EXTRAIR TEXTO
    let texto = "";
    for (let i = 1; i <= Math.min(3, pdf.numPages); i++) {
      const p = await pdf.getPage(i);
      const c = await p.getTextContent();
      texto += c.items.map(i => i.str).join(" ");
    }

    texto = texto.toUpperCase();

    const copies = gerarCopies(texto);

    copies.forEach(copy => {
      const banner = criarBanner(imgURL, copy.titulo, copy.sub);
      container.appendChild(banner);
    });

  };

  reader.readAsArrayBuffer(file);
};


// 🧠 IA MELHORADA DE COPY
function gerarCopies(texto) {

  let base = [
    {titulo:"Conforto e Qualidade de Vida", sub:"Agende sua visita agora"},
    {titulo:"Viva com Sofisticação", sub:"Detalhes que fazem a diferença"},
    {titulo:"Seu Novo Imóvel de Alto Padrão", sub:"Exclusividade para poucos"},
  ];

  if (texto.includes("PISCINA")) {
    base.push({titulo:"Lazer Completo", sub:"Estrutura de resort no seu lar"});
  }

  if (texto.includes("INVEST")) {
    base.push({titulo:"Oportunidade de Investimento", sub:"Alta valorização garantida"});
  }

  return base;
}


// 🎨 CRIAR BANNER PREMIUM
function criarBanner(img, titulo, sub) {

  const div = document.createElement("div");

  div.className = "w-[360px] h-[640px] rounded-3xl overflow-hidden relative shadow-2xl";

  div.innerHTML = `
    <img src="${img}" class="absolute w-full h-full object-cover">

    <!-- overlay escuro profissional -->
    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>

    <!-- efeito lateral -->
    <div class="mask-lines"></div>

    <!-- texto -->
    <div class="absolute bottom-0 p-6">
      <h2 class="text-3xl font-extrabold leading-tight text-pro">${titulo}</h2>
      <p class="text-sm mt-2 text-zinc-200 text-pro">${sub}</p>
    </div>
  `;

  return div;
}


// DOWNLOAD EM ALTA QUALIDADE
function baixarTudo() {

  const banners = document.querySelectorAll("#banners > div");

  banners.forEach((b, i) => {
    html2canvas(b, { scale: 3 }).then(canvas => {
      const link = document.createElement('a');
      link.download = `banner-${i}.jpg`;
      link.href = canvas.toDataURL('image/jpeg', 1);
      link.click();
    });
  });

}

</script>

</body>
</html>
