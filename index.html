<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-[#0f172a] text-white font-sans">
  <div class="max-w-5xl mx-auto p-10 flex flex-col md:flex-row gap-10">
    <div class="w-full md:w-1/3 space-y-6">
      <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-gold-400 to-yellow-600 tracking-tight">AI BANNER PRO</h1>
      <p class="text-gray-400 text-sm">Arraste o Book PDF para gerar o anúncio.</p>
      <input type="file" id="upload" accept="application/pdf" class="block w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-yellow-500 file:text-black hover:file:bg-yellow-400 cursor-pointer">
      <div id="status" class="text-xs text-yellow-500 font-mono italic"></div>
    </div>

    <div id="banner" class="w-[360px] h-[640px] bg-black rounded-[40px] border-[8px] border-gray-800 shadow-2xl relative overflow-hidden flex flex-col justify-end p-8 mx-auto">
      <div class="absolute inset-0 opacity-40 bg-[url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800')] bg-cover"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
      
      <div class="z-10 space-y-4">
        <div class="h-1 w-12 bg-yellow-500"></div>
        <h2 id="b-nome" class="text-3xl font-black leading-none uppercase">Aguardando Book...</h2>
        <p id="b-local" class="text-yellow-500 font-medium tracking-widest text-xs uppercase">Selecione o arquivo</p>
        <button class="w-full py-4 bg-white text-black font-bold text-sm rounded-xl uppercase tracking-widest mt-4">Saiba Mais</button>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('upload');
    input.onchange = async (e) => {
      document.getElementById('status').innerText = "Processando inteligência do PDF...";
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = async function() {
        const loadingTask = pdfjsLib.getDocument(new Uint8Array(this.result));
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const content = await page.getTextContent();
        const texto = content.items.map(item => item.str).join(" ");
        
        // Simulação de extração inteligente
        document.getElementById('b-nome').innerText = texto.split(' ').slice(0, 4).join(' ');
        document.getElementById('b-local').innerText = "Localização extraída do Book";
        document.getElementById('status').innerText = "Banner Gerado com Sucesso!";
      };
      reader.readAsArrayBuffer(file);
    };
  </script>
</body>
