<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white">

<div class="flex flex-col lg:flex-row min-h-screen">

<!-- CONTROLE -->
<div class="p-6 lg:w-1/3 bg-zinc-900">
  <h1 class="text-3xl font-black text-yellow-500 mb-6">IMOB AI PRO</h1>

  <label class="block w-full p-6 border-2 border-dashed border-yellow-500 rounded-xl text-center cursor-pointer mb-4">
    <span class="font-bold">📄 CARREGAR BOOK</span>
    <input type="file" id="upload" accept="application/pdf" class="hidden">
  </label>

  <button onclick="baixarTudo()" class="w-full bg-white text-black p-4 rounded font-bold">
    BAIXAR TODOS OS BANNERS
  </button>

  <p id="status" class="text-xs mt-4 text-zinc-400"></p>
</div>

<!-- BANNERS -->
<div class="flex-1 flex flex-wrap gap-6 items-center justify-center p-6">

  <div class="banner w-[300px] h-[500px] rounded-2xl overflow-hidden relative bg-cover bg-center" id="b1">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="absolute bottom-0 p-4">
      <h2 id="t1" class="text-xl font-black"></h2>
      <p id="s1" class="text-xs"></p>
    </div>
  </div>

  <div class="banner w-[300px] h-[500px] rounded-2xl overflow-hidden relative bg-cover bg-center" id="b2">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="absolute bottom-0 p-4">
      <h2 id="t2" class="text-xl font-black"></h2>
      <p id="s2" class="text-xs"></p>
    </div>
  </div>

  <div class="banner w-[300px] h-[500px] rounded-2xl overflow-hidden relative bg-cover bg-center" id="b3">
    <div class="absolute inset-0 bg-black/50"></div>
    <div class="absolute bottom-0 p-4">
      <h2 id="t3" class="text-xl font-black"></h2>
      <p id="s3" class="text-xs"></p>
    </div>
  </div>

</div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

document.getElementById('upload').onchange = async (e) => {

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function() {

    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

    const page = await pdf.getPage(1);
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const viewport = page.getViewport({ scale: 2 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    await page.render({ canvasContext: ctx, viewport }).promise;

    const img = canvas.toDataURL("image/jpeg");

    // aplica imagem em todos
    document.querySelectorAll(".banner").forEach(b=>{
      b.style.backgroundImage = `url(${img})`;
    });

    // texto
    let texto = "";
    for (let i = 1; i <= Math.min(3, pdf.numPages); i++) {
      const p = await pdf.getPage(i);
      const c = await p.getTextContent();
      texto += c.items.map(i => i.str).join(" ");
    }

    texto = texto.toUpperCase();

    // COPYS PROFISSIONAIS
    const copys = [
      {
        t: "Arquitetura Exclusiva",
        s: "Um projeto de alto padrão que redefine sofisticação"
      },
      {
        t: "Oportunidade de Investimento",
        s: "Alta valorização em localização estratégica"
      },
      {
        t: "Viva com Conforto e Estilo",
        s: "Espaços pensados para sua família viver melhor"
      }
    ];

    document.getElementById("t1").innerText = copys[0].t;
    document.getElementById("s1").innerText = copys[0].s;

    document.getElementById("t2").innerText = copys[1].t;
    document.getElementById("s2").innerText = copys[1].s;

    document.getElementById("t3").innerText = copys[2].t;
    document.getElementById("s3").innerText = copys[2].s;

  };

  reader.readAsArrayBuffer(file);
};

function baixarTudo(){
  document.querySelectorAll(".banner").forEach((el, i)=>{
    html2canvas(el).then(canvas=>{
      let link = document.createElement('a');
      link.download = 'banner'+(i+1)+'.jpg';
      link.href = canvas.toDataURL();
      link.click();
    });
  });
}
</script>

</body>
</html>
