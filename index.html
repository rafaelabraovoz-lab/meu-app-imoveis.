<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<body class="bg-black text-white font-sans antialiased">
  <div class="flex flex-col lg:flex-row min-h-screen">
    <div class="p-8 lg:w-1/3 bg-zinc-900 border-r border-zinc-800 flex flex-col justify-center">
      <h1 class="text-4xl font-black tracking-tighter mb-2 italic text-yellow-500">IMOB AI PRO</h1>
      <p class="text-zinc-500 text-sm mb-8">Transforme Books PDF em Campanhas de Luxo.</p>
      
      <div class="space-y-6">
        <label class="group block p-12 border-2 border-dashed border-zinc-700 rounded-[30px] hover:border-yellow-500 transition-all cursor-pointer text-center">
          <span class="text-zinc-400 group-hover:text-yellow-500 font-bold block">CARREGAR BOOK LANÇAMENTO</span>
          <input type="file" id="upload" accept="application/pdf" class="hidden">
        </label>
        
        <button onclick="baixar()" class="w-full bg-white text-black font-black py-5 rounded-2xl hover:bg-yellow-500 transition-colors uppercase tracking-widest text-xs">Exportar para Instagram</button>
      </div>
      <div id="status" class="mt-6 text-[10px] font-mono text-zinc-500 uppercase tracking-widest text-center"></div>
    </div>

    <div class="flex-1 bg-[#050505] flex items-center justify-center p-6">
      <div id="capture" class="w-[360px] h-[640px] bg-zinc-800 relative rounded-[50px] shadow-2xl overflow-hidden border-[8px] border-zinc-900">
        <canvas id="pdf-render" class="absolute inset-0 w-full h-full object-cover opacity-70"></canvas>
        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
        
        <div class="absolute inset-x-0 bottom-0 p-10 space-y-4">
          <div class="w-12 h-1 bg-yellow-500 mb-2"></div>
          <h2 id="b-titulo" class="text-4xl font-black uppercase leading-[0.8] tracking-tighter">O Próximo Ícone</h2>
          <p id="b-desc" class="text-zinc-300 text-sm font-light leading-relaxed">Analise o book para gerar o storytelling automático aqui.</p>
          
          <div class="pt-6 flex items-center justify-between border-t border-white/10">
            <span class="text-[10px] font-black text-yellow-500 tracking-[0.3em] uppercase">Lançamento Exclusivo</span>
            <div class="px-4 py-2 bg-white text-black text-[9px] font-black rounded-full uppercase">Solicitar Book</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    document.getElementById('upload').onchange = async (e) => {
      const status = document.getElementById('status');
      status.innerText = "IA PROCESSANDO BOOK...";
      const file = e.target.files[0];
      const reader = new FileReader();

      reader.onload = async function() {
        const loadingTask = pdfjsLib.getDocument(new Uint8Array(this.result));
        const pdf = await loadingTask.promise;
        
        // RENDERIZAÇÃO DA IMAGEM PRINCIPAL
        const page = await pdf.getPage(1);
        const canvas = document.getElementById('pdf-render');
        const viewport = page.getViewport({ scale: 2 });
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;

        // INTELIGÊNCIA DE STORYTELLING
        let fullText = "";
        for(let i=1; i<=Math.min(4, pdf.numPages); i++){
          const p = await pdf.getPage(i);
          const c = await p.getTextContent();
          fullText += c.items.map(item => item.str).join(" ");
        }

        const t = fullText.toUpperCase();
        if(t.includes("LAZER") || t.includes("PISCINA")) {
          document.getElementById('b-titulo').innerText = "Lazer de Resort Particular";
          document.getElementById('b-desc').innerText = "Uma experiência de férias constante sem sair de casa. Onde o conforto encontra o privilégio.";
        } else {
          document.getElementById('b-titulo').innerText = "Arquitetura que Inspira";
          document.getElementById('b-desc').innerText = "Design moderno e sofisticação em cada m², projetado para o seu novo estilo de vida.";
        }
        status.innerText = "CAMPANHA GERADA!";
      };
      reader.readAsArrayBuffer(file);
    };

    function baixar() {
      html2canvas(document.querySelector("#capture")).then(c => {
        let l = document.createElement('a');
        l.download = 'anuncio-ia.jpg';
        l.href = c.toDataURL('image/jpeg', 0.9);
        l.click();
      });
    }
  </script>
</body>
