<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white">

<div class="flex flex-col lg:flex-row min-h-screen">

<!-- CONTROLE -->
<div class="p-6 lg:w-1/3 bg-zinc-900 flex flex-col justify-center">

  <h1 class="text-3xl font-black text-yellow-500 mb-6">IMOB AI PRO</h1>

  <label class="block w-full p-8 border-2 border-dashed border-yellow-500 rounded-xl text-center cursor-pointer hover:bg-yellow-500 hover:text-black transition mb-4">
    <span class="font-bold text-lg">📄 CARREGAR BOOK</span>
    <input type="file" id="upload" accept="application/pdf" class="hidden">
  </label>

  <button onclick="baixar()" class="w-full bg-white text-black p-4 rounded font-bold hover:bg-yellow-500 transition">
    BAIXAR BANNER
  </button>

  <p id="status" class="text-xs mt-4 text-zinc-400 text-center"></p>

</div>

<!-- BANNER -->
<div class="flex-1 flex items-center justify-center bg-black">

  <div id="banner" 
       class="w-[360px] h-[640px] rounded-3xl overflow-hidden relative shadow-2xl bg-cover bg-center">

    <!-- overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>

    <!-- texto -->
    <div class="absolute bottom-0 p-6">
      <h2 id="titulo" class="text-3xl font-black"></h2>
      <p id="sub" class="text-sm text-zinc-300 mt-2"></p>
    </div>

  </div>

</div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

document.getElementById('upload').onchange = async (e) => {

  const status = document.getElementById('status');
  status.innerText = "Processando PDF...";

  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function() {

    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

    const page = await pdf.getPage(1);

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    const viewport = page.getViewport({ scale: 2 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    await page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise;

    // 🔥 CONVERTE PRA IMAGEM
    const imgData = canvas.toDataURL("image/jpeg", 1.0);

    // 🔥 APLICA COMO BACKGROUND
    document.getElementById("banner").style.backgroundImage = `url(${imgData})`;

    // 🧠 TEXTO
    let texto = "";

    for (let i = 1; i <= Math.min(3, pdf.numPages); i++) {
      const p = await pdf.getPage(i);
      const c = await p.getTextContent();
      texto += c.items.map(i => i.str).join(" ");
    }

    texto = texto.toUpperCase();

    let titulo = "Seu Novo Imóvel";
    let sub = "Descubra um novo padrão de viver";

    if (texto.includes("PISCINA") || texto.includes("LAZER")) {
      titulo = "Lazer de Alto Padrão";
      sub = "Um verdadeiro resort particular";
    }

    if (texto.includes("LUXO") || texto.includes("ALTO PADRAO")) {
      titulo = "Arquitetura Exclusiva";
      sub = "Sofisticação em cada detalhe";
    }

    if (texto.includes("INVESTIMENTO")) {
      titulo = "Oportunidade Única";
      sub = "Alta valorização garantida";
    }

    document.getElementById("titulo").innerText = titulo;
    document.getElementById("sub").innerText = sub;

    status.innerText = "✅ Banner pronto!";
  };

  reader.readAsArrayBuffer(file);
};

function baixar() {
  html2canvas(document.querySelector("#banner")).then(canvas => {
    let link = document.createElement('a');
    link.download = 'banner.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  });
}

</script>

</body>
</html>
