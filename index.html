<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body class="bg-black text-white">

<div class="flex flex-col lg:flex-row min-h-screen">

<!-- CONTROLE -->
<div class="p-6 lg:w-1/3 bg-zinc-900">
  <h1 class="text-3xl font-black text-yellow-500 mb-6">IMOB AI PRO</h1>

  <label class="block w-full p-6 border-2 border-dashed border-yellow-500 rounded-xl text-center cursor-pointer mb-4">
    <span class="font-bold">📄 CARREGAR BOOK</span>
    <input type="file" id="upload" accept="application/pdf" class="hidden">
  </label>

  <button onclick="baixarTudo()" class="w-full bg-white text-black p-4 rounded font-bold">
    BAIXAR CAMPANHA COMPLETA
  </button>

  <p id="status" class="text-xs mt-4 text-zinc-400"></p>
</div>

<!-- AREA -->
<div id="area" class="flex-1 flex flex-wrap gap-8 p-6 justify-center"></div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

const copies = [
  ["Arquitetura Exclusiva","Um novo nível de sofisticação para quem exige mais"],
  ["O Endereço do Prestígio","Localização que valoriza seu patrimônio"],
  ["Invista no Extraordinário","Alta valorização em um projeto único"],
  ["Design que Impressiona","Cada detalhe pensado para encantar"],
  ["Seu Novo Padrão de Vida","Conforto, luxo e exclusividade em um só lugar"]
];

document.getElementById('upload').onchange = async (e) => {

  const status = document.getElementById('status');
  status.innerText = "🔎 ANALISANDO BOOK...";

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function() {

    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

    let banners = "";
    let usados = 0;

    for (let i = 1; i <= pdf.numPages; i++) {

      if (usados >= 5) break;

      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const texto = content.items.map(i => i.str).join(" ");

      // FILTRO DE PÁGINA BOA
      if (texto.length > 1500) continue;

      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement("canvas");

      canvas.height = viewport.height;
      canvas.width = viewport.width;

      await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport
      }).promise;

      const img = canvas.toDataURL("image/jpeg");

      if (img.length < 80000) continue;

      const c = copies[usados % copies.length];

      banners += `
        <div class="banner" style="
          width:1080px;
          height:1920px;
          background-image:url('${img}');
          background-size:cover;
          background-position:center;
          position:relative;
          border-radius:20px;
          overflow:hidden;
        ">

          <div style="
            position:absolute;
            inset:0;
            background:linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
          "></div>

          <div style="
            position:absolute;
            bottom:0;
            padding:80px;
          ">

            <h2 style="
              font-family:'Playfair Display';
              font-size:80px;
              font-weight:900;
              line-height:1;
              text-shadow:0 10px 40px rgba(0,0,0,0.9);
            ">
              ${c[0]}
            </h2>

            <p style="
              font-family:'Montserrat';
              font-size:28px;
              margin-top:20px;
              opacity:0.9;
            ">
              ${c[1]}
            </p>

            <div style="
              margin-top:30px;
              font-size:14px;
              letter-spacing:4px;
              opacity:0.7;
            ">
              ALTO PADRÃO • LANÇAMENTO
            </div>

          </div>

        </div>
      `;

      usados++;
    }

    document.getElementById("area").innerHTML = banners;

    status.innerText = "✅ CAMPANHA GERADA";

  };

  reader.readAsArrayBuffer(file);
};

function baixarTudo(){
  document.querySelectorAll(".banner").forEach((el, i)=>{
    html2canvas(el, { scale: 3 }).then(canvas=>{
      let link = document.createElement('a');
      link.download = 'banner_'+(i+1)+'.jpg';
      link.href = canvas.toDataURL('image/jpeg',1);
      link.click();
    });
  });
}

</script>

</body>
</html>
