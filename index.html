<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<body class="bg-zinc-950 text-white font-light">
  <div class="p-6 max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
    
    <div>
      <h1 class="text-3xl font-black mb-2 italic">IMOB-IA <span class="text-yellow-500 text-sm">V2.0</span></h1>
      <p class="text-gray-500 mb-6">Arraste o book de lançamento para gerar a campanha.</p>
      <input type="file" id="upload" class="w-full p-12 border border-zinc-800 rounded-3xl bg-zinc-900 cursor-pointer hover:bg-zinc-800 transition">
      <div id="status" class="mt-4 p-4 bg-yellow-500/10 border border-yellow-500/20 rounded-xl text-yellow-500 text-xs hidden">Processando inteligência de mercado...</div>
    </div>

    <div id="banner" class="w-[380px] h-[670px] bg-black mx-auto relative rounded-[40px] shadow-2xl overflow-hidden border-[6px] border-zinc-800">
      <canvas id="img-fundo" class="absolute inset-0 w-full h-full object-cover opacity-70"></canvas>
      <div class="absolute inset-0 bg-gradient-to-t from-black via-black/20 to-transparent"></div>
      
      <div class="absolute inset-0 p-10 flex flex-col justify-end">
        <span class="text-yellow-500 font-bold tracking-[0.3em] text-[10px] uppercase mb-2">Grande Lançamento</span>
        <h2 id="titulo" class="text-4xl font-black uppercase leading-none mb-4">Carregando Book...</h2>
        <div class="h-[2px] w-16 bg-white mb-6"></div>
        <p id="descricao" class="text-sm text-gray-300 mb-8 leading-relaxed">Aguardando a extração dos diferenciais de lazer e planta...</p>
        
        <div class="flex justify-between items-end">
          <div id="icones" class="flex gap-3 text-[10px] font-bold text-yellow-500 italic"></div>
          <div class="bg-white text-black text-[10px] font-black px-5 py-3 rounded-full uppercase tracking-tighter">Agendar Visita</div>
        </div>
      </div>
    </div>

  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    document.getElementById('upload').onchange = async (e) => {
      document.getElementById('status').classList.remove('hidden');
      const file = e.target.files[0];
      const reader = new FileReader();

      reader.onload = async function() {
        const loadingTask = pdfjsLib.getDocument(new Uint8Array(this.result));
        const pdf = await loadingTask.promise;
        
        // Pega a página 1 (Geralmente a fachada)
        const page = await pdf.getPage(1);
        const canvas = document.getElementById('img-fundo');
        const context = canvas.getContext('2d');
        const viewport = page.getViewport({ scale: 2 });
        canvas.height = viewport.height; canvas.width = viewport.width;
        await page.render({ canvasContext: context, viewport: viewport }).promise;

        // Extrai texto de várias páginas para ser "inteligente"
        let textoCompleto = "";
        for(let i=1; i<=Math.min(5, pdf.numPages); i++){
          const p = await pdf.getPage(i);
          const c = await p.getTextContent();
          textoCompleto += c.items.map(item => item.str).join(" ");
        }

        // Lógica de Vendas
        const txt = textoCompleto.toLowerCase();
        const nome = textoCompleto.split(/\s+/).slice(0, 4).join(" ");
        
        document.getElementById('titulo').innerText = nome;
        
        let diferenciais = [];
        if(txt.includes("piscina")) diferenciais.push("Lazer Completo");
        if(txt.includes("suíte")) diferenciais.push("Plantas Inteligentes");
        if(txt.includes("vaga")) diferenciais.push("Vagas Privativas");

        document.getElementById('descricao').innerText = `Um projeto exclusivo que une ${diferenciais.join(" e ")}. O novo ícone de sofisticação que você esperava.`;
        document.getElementById('icones').innerHTML = diferenciais.map(d => `<span>#${d.replace(/\s/g, '_').toUpperCase()}</span>`).join("");
        
        document.getElementById('status').innerText = "CAMPANHA GERADA COM SUCESSO!";
      };
      reader.readAsArrayBuffer(file);
    };
  </script>
</body>
