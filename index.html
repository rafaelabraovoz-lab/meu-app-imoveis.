<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white">

<div class="flex flex-col lg:flex-row min-h-screen">

<!-- CONTROLE -->
<div class="p-6 lg:w-1/3 bg-zinc-900">
  <h1 class="text-3xl font-black text-yellow-500 mb-4">IMOB AI PRO</h1>

  <input type="file" id="upload" accept="application/pdf"
  class="w-full p-4 bg-zinc-800 rounded mb-4">

  <button onclick="baixar()" class="w-full bg-white text-black p-3 rounded font-bold">
    BAIXAR BANNER
  </button>

  <p id="status" class="text-xs mt-4 text-zinc-400"></p>
</div>

<!-- BANNER -->
<div class="flex-1 flex items-center justify-center">
  <div id="banner" class="w-[360px] h-[640px] bg-black rounded-3xl overflow-hidden relative">

    <canvas id="pdf-img" class="absolute inset-0 w-full h-full object-cover"></canvas>

    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/30 to-transparent"></div>

    <div class="absolute bottom-0 p-6">
      <h2 id="titulo" class="text-3xl font-black"></h2>
      <p id="sub" class="text-sm text-zinc-300 mt-2"></p>
    </div>

  </div>
</div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

document.getElementById('upload').onchange = async (e) => {

  const status = document.getElementById('status');
  status.innerText = "Processando PDF...";

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function() {

    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

    // 🖼️ PEGAR IMAGEM DA PRIMEIRA PÁGINA
    const page = await pdf.getPage(1);
    const canvas = document.getElementById('pdf-img');
    const viewport = page.getViewport({ scale: 2 });

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    await page.render({
      canvasContext: canvas.getContext('2d'),
      viewport: viewport
    }).promise;

    // 📝 EXTRAIR TEXTO
    let texto = "";

    for (let i = 1; i <= Math.min(3, pdf.numPages); i++) {
      const p = await pdf.getPage(i);
      const c = await p.getTextContent();
      texto += c.items.map(i => i.str).join(" ");
    }

    texto = texto.toUpperCase();

    // 🧠 IA DE COPY
    let titulo = "Seu Novo Imóvel";
    let sub = "Descubra um novo padrão de viver";

    if (texto.includes("PISCINA") || texto.includes("LAZER")) {
      titulo = "Lazer de Alto Padrão";
      sub = "Um verdadeiro resort particular para sua família";
    }

    if (texto.includes("LUXO") || texto.includes("ALTO PADRAO")) {
      titulo = "Arquitetura Exclusiva";
      sub = "Sofisticação e design em cada detalhe";
    }

    if (texto.includes("INVESTIMENTO")) {
      titulo = "Oportunidade Única";
      sub = "Alta valorização em localização estratégica";
    }

    document.getElementById("titulo").innerText = titulo;
    document.getElementById("sub").innerText = sub;

    status.innerText = "Banner gerado com sucesso!";
  };

  reader.readAsArrayBuffer(file);
};

function baixar() {
  html2canvas(document.querySelector("#banner")).then(canvas => {
    let link = document.createElement('a');
    link.download = 'banner-imobiliario.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.95);
    link.click();
  });
}
</script>

</body>
</html>
