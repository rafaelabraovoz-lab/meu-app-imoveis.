<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white">

<div class="flex flex-col lg:flex-row min-h-screen">

<!-- CONTROLE -->
<div class="p-6 lg:w-1/3 bg-zinc-900">
  <h1 class="text-3xl font-black text-yellow-500 mb-6">IMOB AI PRO</h1>

  <label class="block w-full p-6 border-2 border-dashed border-yellow-500 rounded-xl text-center cursor-pointer mb-4">
    <span class="font-bold">📄 CARREGAR BOOK</span>
    <input type="file" id="upload" accept="application/pdf" class="hidden">
  </label>

  <button onclick="baixarTudo()" class="w-full bg-white text-black p-4 rounded font-bold">
    BAIXAR TODOS OS BANNERS
  </button>

  <p id="status" class="text-xs mt-4 text-zinc-400"></p>
</div>

<!-- AREA DOS BANNERS -->
<div id="area" class="flex-1 flex flex-wrap gap-6 p-6 justify-center"></div>

</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

document.getElementById('upload').onchange = async (e) => {

  const status = document.getElementById('status');
  status.innerText = "🔥 GERANDO CAMPANHA COMPLETA...";

  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = async function() {

    const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;

    let textoTotal = "";
    let bannersHTML = "";

    const maxPages = Math.min(5, pdf.numPages);

    for (let i = 1; i <= maxPages; i++) {

      const page = await pdf.getPage(i);
      const viewport = page.getViewport({ scale: 1.5 });

      const canvas = document.createElement("canvas");
      canvas.height = viewport.height;
      canvas.width = viewport.width;

      await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport
      }).promise;

      const img = canvas.toDataURL("image/jpeg");

      // pegar texto
      const content = await page.getTextContent();
      textoTotal += content.items.map(i => i.str).join(" ");

      // gerar copy diferente
      const copy = gerarCopy(textoTotal.toUpperCase(), i);

      bannersHTML += `
        <div class="banner w-[320px] h-[570px] rounded-2xl overflow-hidden relative bg-cover bg-center"
        style="background-image:url('${img}')">

          <div class="absolute inset-0 bg-black/60"></div>

          <div class="absolute bottom-0 p-6">
            <h2 class="text-2xl font-black">${copy.t}</h2>
            <p class="text-sm mt-2">${copy.s}</p>
          </div>

        </div>
      `;
    }

    document.getElementById("area").innerHTML = bannersHTML;

    status.innerText = "✅ CAMPANHA GERADA COM SUCESSO";

  };

  reader.readAsArrayBuffer(file);
};


// 🧠 IA MELHORADA
function gerarCopy(texto, index){

  const luxo = [
    "Exclusividade em cada detalhe",
    "Arquitetura que impressiona",
    "Alto padrão redefinido"
  ];

  const investimento = [
    "Alta valorização garantida",
    "Oportunidade única de investimento",
    "Localização estratégica"
  ];

  const familia = [
    "Perfeito para sua família",
    "Conforto e qualidade de vida",
    "Seu novo lar começa aqui"
  ];

  let tipo;

  if(texto.includes("LUXO") || texto.includes("ALTO PADRAO")){
    tipo = luxo;
  } else if(texto.includes("INVEST")){
    tipo = investimento;
  } else {
    tipo = familia;
  }

  return {
    t: tipo[index % tipo.length],
    s: "Agende sua visita agora e descubra esse empreendimento incrível"
  }
}


// DOWNLOAD
function baixarTudo(){
  document.querySelectorAll(".banner").forEach((el, i)=>{
    html2canvas(el).then(canvas=>{
      let link = document.createElement('a');
      link.download = 'banner_'+(i+1)+'.jpg';
      link.href = canvas.toDataURL();
      link.click();
    });
  });
}

</script>

</body>
</html>
